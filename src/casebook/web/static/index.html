<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Casebook</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header id="topbar">
      <a class="brand" href="/">casebook</a>
      <a id="back-cases" href="/" hidden>← Cases</a>
      <span id="case-title"></span>
      <button id="hotkey-hint" title="keyboard shortcuts">⌨</button>
      <span id="connection" class="disconnected">connecting…</span>
    </header>
    <div id="layout">
      <aside id="sidebar">
        <div id="cases-nav">
          <div class="sidebar-head">
            <h2>Cases</h2>
            <button id="new-case" title="new case">+ case</button>
          </div>
          <ul id="case-list"></ul>
        </div>
        <div id="case-nav" hidden>
          <div class="sidebar-head">
            <h2>Sessions</h2>
            <button id="add-agent" title="new session">+</button>
          </div>
          <select id="backend-select" title="backend for new sessions" hidden></select>
          <ul id="session-list"></ul>
          <div class="sidebar-head files-head"><h2>Files</h2></div>
          <ul id="file-list"></ul>
        </div>
      </aside>
      <main id="workspace">
        <section id="agents" hidden>
          <div id="agent-panes"></div>
          <p id="no-open-sessions" hidden>No open sessions — add one with + or open a closed session from the sidebar.</p>
        </section>
        <p id="placeholder">Select a case to open it on its own page.</p>
      </main>
    </div>

    <div id="toasts"></div>

    <div id="hotkey-help" hidden>
      <div class="modal-body">
        <header><span>Keyboard shortcuts</span><button id="hotkey-help-close">×</button></header>
        <div id="hotkey-help-body"></div>
      </div>
    </div>

    <div id="file-modal" hidden>
      <div class="modal-body">
        <header><span id="file-modal-name"></span><button id="file-modal-close">×</button></header>
        <div id="file-modal-content" class="filebody"></div>
      </div>
    </div>

    <script src="/static/vendor/marked.min.js"></script>
    <script src="/static/vendor/purify.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
